seed: 42
model:
  base_model: unsloth/Llama-3.2-1B-Instruct-bnb-4bit
  lora:
    r: 16
    alpha: 16
    dropout: 0
    target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
data:
  train_file: data/training_data/preferences_train.jsonl
  dev_file: data/training_data/preferences_dev.jsonl
  max_length: 1024
  max_prompt_length: 512
training:
  batch_size: 1
  eval_batch_size: 1
  gradient_accumulation_steps: 4
  num_epochs: 1
  learning_rate: 5.0e-06
  warmup_ratio: 0.1
  beta: 0.1
  logging_steps: 1
  save_strategy: epoch
  eval_strategy: epoch
  optim: adamw_8bit
  weight_decay: 0.0
  lr_scheduler_type: linear
output:
  checkpoint_dir: models/checkpoints
  model_dir: models/judge
  report_dir: reports/training
reporting:
  use_wandb: false
  wandb_project: tenacious-judge
  wandb_run_name: dpo-judge-llama32-1b
