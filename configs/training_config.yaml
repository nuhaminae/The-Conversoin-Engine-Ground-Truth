# configs/training_config.yaml
#
# It locks in hyperparameters and LoRA settings for reproducibility and makes your training pipeline easy to rerun or share.

model:
  base_model: "unsloth/Phi-3-mini-4k-instruct"                # HuggingFace model to fine-tune
  lora:
    enabled: true
    r: 16                                                     # Rank of LoRA matrices
    alpha: 32                                                 # Scaling factor
    dropout: 0.05                                             # Dropout for LoRA layers
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]  # Modules to apply LoRA

data:
  train_file: "data/training_data/preferences_train.jsonl"    # Path to the preference pair dataset that will be created.
  dev_file: "data/training_data/preferences_dev.jsonl"
  max_length: 2048                                            # Max token length that should accommodate prompt, chosen, and rejected responses.
  max_prompt_length: 1024

training:
  # DPO-specific hyperparameters
  beta: 0.1                                                 # The regularisation parameter for DPO
  batch_size: 2                                             # DPO is memory intensive, so small batches are needed.
  gradient_accumulation_steps: 8                            # Accumulate gradients to simulate a larger batch size
  learning_rate: 2e-5
  weight_decay: 0.01
  num_epochs: 3
  warmup_ratio: 0.1 
  logging_steps: 10
  save_strategy: "epoch"
  evaluation_strategy: "epoch"

output:
  model_dir: "models/judge"
  checkpoint_dir: "models/checkpoints"
  logging_dir: "reports/logs"
  report_dir: "reports/training"

reporting:
  use_wandb: false                                         # Set to false if not using Weights & Biases
  wandb_project: "tenacious-judge-dpo"
  wandb_run_name: "dpo-phi3-judge-v1"

seed: 42                                                   # Random seed for reproducibility
