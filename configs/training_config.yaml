# configs/training_config.yaml
#
# It locks in hyperparameters and LoRA settings for reproducibility and makes your training pipeline easy to rerun or share.

model:
  base_model: "distilbert-base-uncased"   # HuggingFace model to fine-tune
  num_labels: 2                          # Binary classification (good vs bad)
  lora:
    enabled: true
    r: 8                                 # Rank of LoRA matrices
    alpha: 16                            # Scaling factor
    dropout: 0.1                         # Dropout for LoRA layers
    target_modules: ["q_proj", "v_proj"] # Modules to apply LoRA

data:
  train_file: "data/splits/train.json"
  dev_file: "data/splits/dev.json"
  test_file: "data/splits/heldout.json"
  max_length: 512                        # Max token length

training:
  batch_size: 16
  learning_rate: 5e-5
  weight_decay: 0.01
  num_epochs: 3
  warmup_steps: 100
  gradient_accumulation_steps: 1
  logging_steps: 50
  save_strategy: "epoch"
  evaluation_strategy: "epoch"
  load_best_model_at_end: true
  metric_for_best_model: "accuracy"

output:
  model_dir: "models/judge"
  checkpoint_dir: "models/checkpoints"
  logging_dir: "reports/logs"

reporting:
  use_wandb: true        # Set to false if not using Weights & Biases
  wandb_project: "tenacious-judge"
  wandb_run_name: "judge-training-v1"

seed: 42                 # Random seed for reproducibility
